<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revion Catan Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Revion Catan Game</h1>
        <div id="hud">
            <!-- HUD elements here -->
        </div>
    </header>
    <main>
        <div id="board-wrap">
            <!-- Original game board structure here -->
        </div>
    </main>
    <footer>
        <p>Game Footer Information</p>
    </footer>
    <script>
        // Original game scripts here

        // Mobile Debug Console
        const debugConsole = document.createElement('div');
        debugConsole.style.position = 'fixed';
        debugConsole.style.bottom = '0';
        debugConsole.style.left = '0';
        debugConsole.style.backgroundColor = 'rgba(0, 0, 0, 0.8)';
        debugConsole.style.color = 'white';
        debugConsole.style.width = '100%';
        debugConsole.style.zIndex = '100';
        debugConsole.innerText = 'Debug Console';
        document.body.appendChild(debugConsole);

        function logDebugInfo(message) {
            debugConsole.innerText += '\n' + message;
        }

        // Use logDebugInfo in your game logic to output debug statements
        logDebugInfo('Game Loaded');
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revion Catan</title>
    <link rel="stylesheet" href="styles.css">
    <script src="game.js" defer></script>
</head>
<body>
    <div id="start-screen">
        <h1>Welcome to Revion Catan!</h1>
        <button id="start-game">Start Game</button>
    </div>
    <div id="hud" style="display:none;">
        <div id="resources">
            <p>Resources: <span id="resource-count">10</span></p>
        </div>
        <div id="trade-panel" style="display:none;">
            <p>Trade Options</p>
        </div>
    </div>
    <div id="board-wrap">
        <canvas id="game-board"></canvas>
    </div>
    <div id="mobile-debug-console" style="display:none; position: fixed; bottom: 0; left: 0; width: 100%; max-height: 200px; background-color: #333; color: green; overflow-y: auto; z-index: 1000;">
        <pre id="console-output"></pre>
    </div>
    <script>
        const consoleOutput = document.getElementById('console-output');
        const mobileDebugConsole = document.getElementById('mobile-debug-console');

        const toggleDebugConsole = () => {
            mobileDebugConsole.style.display = mobileDebugConsole.style.display === 'none' ? 'block' : 'none';
        };

        const showDebugConsole = () => {
            mobileDebugConsole.style.display = 'block';
            mobileDebugConsole.scrollTop = mobileDebugConsole.scrollHeight;
        };

        const log = console.log;
        const error = console.error;

        console.log = function(...args) {
            log.apply(console, args);
            consoleOutput.innerText += args.join(' ') + '\n';
        };

        console.error = function(...args) {
            error.apply(console, args);
            consoleOutput.innerText += '\u001b[31m' + args.join(' ') + '\u001b[0m' + '\n';
            showDebugConsole();
        };

        document.addEventListener('touchstart', (e) => {
            if (e.touches.length === 3) {
                toggleDebugConsole();
            }
        });
    </script>
</body>
</html>

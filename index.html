<!DOCTYPE html>
<html>
<head>
    <title>Index</title>
    <script>
        // Mobile debugging console
        function setupDebugging() {
            if (window.console && console.log) {
                console.log('Debugging console is set up.');
            }
        }

        window.onload = setupDebugging;

        // Error handler
        window.onerror = function(message, source, lineno, colno, error) {
            console.error('Error occurred: ' + message + ' at ' + source + ':' + lineno + ':' + colno);
            // Display error on screen
            document.body.innerHTML += '<div style="color:red;">Error: ' + message + '</div>';
        };
    </script>
</head>
<body>
    <h1>Welcome to RevionCatan</h1>
    <p>This is a sample index.html file.</p>
    
</body>
</html>

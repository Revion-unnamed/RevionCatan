<script>
    // Mobile debug console functionality
    (function() {
        const debugConsole = document.createElement('div');
        debugConsole.style.position = 'fixed';
        debugConsole.style.bottom = '0';
        debugConsole.style.left = '0';
        debugConsole.style.width = '100%';
        debugConsole.style.height = '200px';
        debugConsole.style.backgroundColor = 'black';
        debugConsole.style.color = 'green';
        debugConsole.style.overflowY = 'scroll';
        debugConsole.style.zIndex = '9999';
        debugConsole.style.display = 'none';
        document.body.appendChild(debugConsole);
        
        const originalLog = console.log;
        console.log = function(...args) {
            originalLog.apply(console, args);
            const message = args.join(' ');
            const logEntry = document.createElement('div');
            logEntry.textContent = message;
            debugConsole.appendChild(logEntry);
            debugConsole.scrollTop = debugConsole.scrollHeight;
        };
        
        // Error handling
        window.onerror = function(message, source, lineno, colno, error) {
            console.log('Error: ' + message + ' at ' + source + ':' + lineno + ':' + colno);
            debugConsole.style.display = 'block';
        };
        
        // Toggle console with three-finger tap
        let touchCount = 0;
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length === 3) {
                touchCount++;
                if (touchCount % 2 === 1) {
                    debugConsole.style.display = 'block';
                } else {
                    debugConsole.style.display = 'none';
                }
            }
        });
    })();
</script>
